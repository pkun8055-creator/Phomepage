<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ぴー のサイト集</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome CDN -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  />

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f0f0;
      color: #333;
      text-align: center;
    }

    /* ヘッダー：強めの緑グラデーション */
    header {
      background: linear-gradient(135deg, #2c7a2c, #56ab2f, #a8e063); /* 緑系グラデーションを強化 */
      color: #fff;
      padding: 60px 20px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      text-align: center;
    }

    header h1 {
      font-size: 40px;
      margin: 0;
    }

    header p {
      font-size: 20px;
      margin-top: 12px;
    }

    /* メイン */
    main {
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center; /* ボタンを中央に */
    }

    /* リンクボックス */
    .link-box {
      background: #fff;
      margin: 15px 0;
      padding: 20px 30px;
      width: 100%;
      max-width: 420px;
      border-radius: 14px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: all 0.25s ease;
    }

    /* ボックス浮き上がる効果 */
    .link-box:hover,
    .link-box:focus-within {
      transform: translateY(-6px) scale(1.05);
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }

    /* リンクとアイコン */
    .link-box a {
      display: flex;
      align-items: center;
      justify-content: center; /* 中央寄せ */
      color: #007bff;
      font-weight: bold;
      font-size: 18px;
      text-decoration: none;
    }

    .link-box i {
      font-size: 24px;
      margin-right: 10px;
    }

    /* フッター */
    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 14px;
      background: #eee;
    }

    footer a {
      color: #007bff;
      text-decoration: none;
    }

    /* レスポンシブ */
    @media (max-width: 480px) {
      .link-box {
        max-width: 90%;
        padding: 15px;
      }
      header h1 {
        font-size: 32px;
      }
      header p {
        font-size: 16px;
      }
      .link-box a {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>ぴー のサイト集</h1>
    <p>制作物・リンクまとめ</p>
  </header>

  <main>
    <div class="link-box">
      <a href="https://discord.com/oauth2/authorize?client_id=1423901864038236221" target="_blank">
        🤖 ぴーbot（Discord Bot）
      </a>
    </div>

    <div class="link-box">
      <a href="https://pkun8055-creator.github.io/webchat.github.io/" target="_blank">
        💬 Webチャット
      </a>
    </div>

    <div class="link-box">
      <a href="https://m.youtube.com/@%E3%81%B4%E3%83%BC_%E3%83%9E%E3%82%A4%E3%82%AF%E3%83%A9/featured" target="_blank">
        <i class="fab fa-youtube" style="color:#FF0000;"></i> YouTubeチャンネル
      </a>
    </div>

    <div class="link-box">
      <a href="https://discord.gg/EJm5zHZnvh" target="_blank">
        <i class="fab fa-discord" style="color:#7289DA;"></i> Discordサーバー
      </a>
    </div>
  </main>

  <footer>
    <p>© 2026 ぴー</p>
    <p><a href="terms.html">利用規約</a></p>
  </footer>

</body>
</html>
